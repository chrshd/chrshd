---
layout: default
---

{% for section in page.sections %}
    <div class="grid gap-6 md:grid-cols-3 xl:grid-cols-4 pb-6 md:pb-12 border-b-2 border-dotted border-teal-400">
        <h2 class="lg:self-start lg:sticky lg:top-6 md:col-span-1 text-slate-500 font-semibold">
            {{ section.heading }}
        </h2>

        <div class="md:col-span-2 font-light prose max-w-none">
            {{ section.text | markdownify }}
        </div>
    </div>
{% endfor %}
