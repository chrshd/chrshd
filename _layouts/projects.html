---
layout: default
---

{% for project in site.projects %}
    <div class="grid md:gap-6 md:grid-cols-3 xl:grid-cols-4 relative group transition duration-700 ease-out hover:bg-teal-100">
        <div class="md:col-span-1 aspect-video overflow-hidden border border-solid border-gray-300">
            <img src="{{ project.image | relative_url }}" alt="{{ page.title }}">
        </div>

        <div class="flex flex-col gap-6 md:col-span-2 font-light p-6 md:py-6 md:px-0 justify-between">
            <h2 class="lg:text-2xl font-semibold leading-8 underline underline-offset-8 decoration-dotted decoration-2 group-hover:decoration-0">
                {{ project.title }}
            </h2>
                  
            {% include category-pills.html categories=project.categories %}        
        </div>
        <a class="absolute inset-0 z-10" href="{{ project.url | relative_url }}"></a>
    </div>
{% endfor %}
